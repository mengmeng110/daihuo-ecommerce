name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static export
        run: |
          # 1. 临时禁用 API 路由和问题页面
          mv src/app/api src/app/_api_disabled
          mv src/app/project/new/page.tsx src/app/project/new/_page_backup.tsx
          
          # 2. 添加 output: export
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('next.config.ts', 'utf8');
          c = c.replace('const nextConfig: NextConfig = {',
            'const nextConfig: NextConfig = {\n  output: \"export\",');
          fs.writeFileSync('next.config.ts', c);
          "
          
          # 3. 构建
          npm run build 2>&1
          
          # 4. 恢复
          mv src/app/project/new/_page_backup.tsx src/app/project/new/page.tsx
          mv src/app/_api_disabled src/app/api

      - name: Copy web assets to Capacitor
        run: |
          if [ -d "out" ]; then
            echo "✅ Next.js 静态导出成功! (大小: $(du -sh out/ | cut -f1))"
            rm -rf android/app/src/main/assets/public/*
            cp -r out/* android/app/src/main/assets/public/
          else
            echo "⚠️ out 目录不存在，构建可能失败"
            exit 1
          fi

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mengmeng-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
