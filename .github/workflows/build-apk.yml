name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      vercel_url: ${{ steps.vercel-deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static export
        run: |
          mv src/app/api src/app/_api_disabled
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('next.config.ts', 'utf8');
          c = c.replace('const nextConfig: NextConfig = {',
            'const nextConfig: NextConfig = {\n  output: \"export\",');
          fs.writeFileSync('next.config.ts', c);
          "
          npm run build 2>&1
          mv src/app/_api_disabled src/app/api

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          npx vercel --token="${VERCEL_TOKEN}" --prod --yes 2>&1 | tee vercel_output.txt
          URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.vercel\.app' vercel_output.txt | head -1)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "✅ 部署到: ${URL}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static export
        run: |
          mv src/app/api src/app/_api_disabled
          node -e "
          const fs = require('fs');
          let c = fs.readFileSync('next.config.ts', 'utf8');
          c = c.replace('const nextConfig: NextConfig = {',
            'const nextConfig: NextConfig = {\n  output: \"export\",');
          fs.writeFileSync('next.config.ts', c);
          "
          npm run build 2>&1
          mv src/app/_api_disabled src/app/api

      - name: Set Vercel URL & copy assets
        run: |
          VERCEL_URL="${{ needs.deploy.outputs.vercel_url }}"
          if [ -n "$VERCEL_URL" ]; then
            echo "🔗 使用 Vercel URL: $VERCEL_URL"
            # 写入 capacitor 配置
            node -e "
            const c = require('./capacitor.config.json');
            c.server = { url: '$VERCEL_URL', cleartext: false };
            require('fs').writeFileSync('capacitor.config.json', JSON.stringify(c, null, 2));
            "
          else
            echo "⚠️ 无 Vercel URL，使用离线模式"
          fi

          # 复制 web 资源
          if [ -d "out" ]; then
            echo "✅ 静态导出成功 ($(du -sh out/ | cut -f1))"
            rm -rf android/app/src/main/assets/public/*
            cp -r out/* android/app/src/main/assets/public/
          fi

      - name: Create local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mengmeng-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
