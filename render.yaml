services:
  - type: web
    name: daihuo-jianshou
    env: node
    buildCommand: npx shadcn@latest add --yes; pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
